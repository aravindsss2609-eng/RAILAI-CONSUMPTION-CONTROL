<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic & Signaling - RailAI Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-300 font-mono">
    <!-- Required for navigation injection -->
    <nav>
       <div class="flex flex-wrap justify-center gap-x-4 gap-y-2 text-[10px] font-mono uppercase tracking-widest">
            <a href="/" class="text-emerald-400 font-bold border-b border-emerald-500 pb-1">Dashboard</a>
            <a href="/asset-health" class="text-slate-400 hover:text-emerald-400 transition">Asset Health</a>
            <a href="/energy" class="text-slate-400 hover:text-emerald-400 transition">Energy</a>
            <a href="/security" class="text-slate-400 hover:text-emerald-400 transition">Security</a>
            <a href="/traffic" class="text-slate-400 hover:text-emerald-400 transition">Traffic</a>
            <a href="/analytics" class="text-slate-400 hover:text-emerald-400 transition">Analytics</a>
            <a href="/history" class="text-slate-400 hover:text-emerald-400 transition">History</a>
            <a href="/predict_page" class="text-slate-400 hover:text-emerald-400 transition">AI Lab</a>
        </div>
    </nav>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-black text-white uppercase tracking-tighter">Traffic & Signaling</h1>
                <p class="text-emerald-500 text-xs font-bold uppercase mt-1 tracking-widest">Predictive Network Congestion Matrix</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase text-slate-500">System Throughput</p>
                <p class="text-xl font-black text-white">98.2%</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Congestion Forecast -->
            <div class="lg:col-span-2 bg-slate-900 p-8 border border-slate-800 rounded-lg shadow-xl">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Real-Time Segment Load</h3>
                <div class="h-64">
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>

            <!-- Signaling Status -->
            <div class="bg-slate-900 p-6 border border-slate-800 rounded-lg shadow-xl">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Active Signaling Nodes</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center bg-slate-950 p-3 rounded border border-slate-800">
                        <span>Sector A-1</span>
                        <span class="text-emerald-500 text-[10px] font-bold bg-emerald-500/10 px-2 py-0.5 rounded">CLEAR</span>
                    </div>
                    <div class="flex justify-between items-center bg-slate-950 p-3 rounded border border-slate-800">
                        <span>Sector B-4</span>
                        <span class="text-amber-500 text-[10px] font-bold bg-amber-500/10 px-2 py-0.5 rounded">CAUTION</span>
                    </div>
                    <div class="flex justify-between items-center bg-slate-950 p-3 rounded border border-slate-800">
                        <span>Sector C-9</span>
                        <span class="text-emerald-500 text-[10px] font-bold bg-emerald-500/10 px-2 py-0.5 rounded">CLEAR</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Predictive Traffic Chart
        const ctx = document.getElementById('trafficChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Sect A', 'Sect B', 'Sect C', 'Sect D', 'Sect E', 'Sect F'],
                datasets: [{ 
                    label: 'Predicted Load', 
                    data: [45, 78, 30, 92, 55, 40], 
                    backgroundColor: '#10b981' 
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, grid: { color: '#334155' } }, x: { grid: { display: false } } } 
            }
        });
    </script>
</body>
</html>
