<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic Intelligence | RailAI Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .cyber-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-mono selection:bg-emerald-500/30">

    <nav></nav>

    <main class="p-8 max-w-7xl mx-auto">
        <header class="mb-10 border-b border-slate-800 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black text-white uppercase tracking-tighter">Traffic & Signaling</h1>
                <p class="text-emerald-500 text-xs font-bold uppercase tracking-[0.2em] mt-2">Network Congestion Matrix: Predictive Analysis Active</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase text-slate-500 font-bold tracking-widest">Global Throughput</p>
                <p class="text-3xl font-black text-white" id="val-throughput">--%</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Congestion Forecast -->
            <div class="lg:col-span-2 cyber-panel p-8 rounded-lg">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6 flex items-center">
                    <i class="fa-solid fa-chart-bar mr-2 text-emerald-500"></i> Real-Time Segment Load Distribution
                </h3>
                <div class="h-64">
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>

            <!-- Signaling Status -->
            <div class="cyber-panel p-6 rounded-lg">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6 flex items-center">
                    <i class="fa-solid fa-traffic-light mr-2 text-emerald-500"></i> Active Signaling Nodes
                </h3>
                <div id="node-container" class="space-y-3">
                    <!-- Nodes injected dynamically -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Chart Initialization
        const ctx = document.getElementById('trafficChart').getContext('2d');
        const trafficChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['A-1', 'B-4', 'C-9', 'D-2', 'E-5', 'F-8'],
                datasets: [{ label: 'Predicted Load (%)', data: [0,0,0,0,0,0], backgroundColor: '#10b981' }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, max: 100, grid: { color: '#1e293b' } }, x: { grid: { display: false } } } 
            }
        });

        async function updateTraffic() {
            try {
                const response = await fetch('/api/get-traffic-status');
                const data = await response.json();

                // Update Throughput
                document.getElementById('val-throughput').innerText = data.system_throughput + '%';

                // Update Chart
                trafficChart.data.datasets[0].data = data.segment_load;
                trafficChart.update();

                // Update Node Status
                const nodeContainer = document.getElementById('node-container');
                nodeContainer.innerHTML = Object.entries(data.node_status).map(([node, status]) => `
                    <div class="flex justify-between items-center bg-slate-950 p-3 rounded border border-slate-800">
                        <span class="text-xs font-bold uppercase">${node}</span>
                        <span class="text-[9px] font-bold px-2 py-1 rounded ${status === 'CLEAR' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-amber-500/10 text-amber-500'}">
                            ${status}
                        </span>
                    </div>
                `).join('');

            } catch (e) { console.error("Traffic Telemetry Latency"); }
        }

        setInterval(updateTraffic, 3000);
        updateTraffic();
    </script>
</body>
</html>
