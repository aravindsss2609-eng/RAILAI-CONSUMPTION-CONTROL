<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Health - RailAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-300">
    <main class="p-8">
        <h1 class="text-3xl font-black text-white mb-6">Asset Health Diagnostics</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-900 p-6 border border-slate-800 rounded-lg">
                <h3 class="text-emerald-500 font-bold mb-2">Mechanical Integrity</h3>
                <p class="text-4xl font-mono">98.4%</p>
            </div>
            <div class="bg-slate-900 p-6 border border-slate-800 rounded-lg">
                <h3 class="text-emerald-500 font-bold mb-2">Vibration Index</h3>
                <p class="text-4xl font-mono">0.04g</p>
            </div>
            <div class="bg-slate-900 p-6 border border-slate-800 rounded-lg">
                <h3 class="text-emerald-500 font-bold mb-2">Service Interval</h3>
                <p class="text-4xl font-mono">12k KM</p>
            </div>
        </div>
    </main>
</body>
</html>
