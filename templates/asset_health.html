<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Health Intelligence | RailAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .data-glitch { font-family: 'Courier New', monospace; }
        .card-bg { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans selection:bg-emerald-500/30">

    <main class="p-8 max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tight uppercase">Asset Diagnostics</h1>
                <p class="text-emerald-500 text-xs font-bold tracking-[0.2em] uppercase mt-2">Engineered Predictive Maintenance Suite</p>
            </div>
            <div id="status-badge" class="flex items-center gap-2 px-4 py-1 rounded-full border border-emerald-500/30 bg-emerald-500/10 text-emerald-400">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                <span class="text-[10px] font-bold uppercase tracking-widest">System Synchronized</span>
            </div>
        </header>

        <!-- KPI Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="card-bg p-5 rounded-lg border-l-4 border-emerald-500">
                <p class="text-slate-500 text-[10px] uppercase tracking-wider font-bold">Integrity Score</p>
                <p class="text-3xl font-black text-white mt-1" id="val-mech">--</p>
            </div>
            <div class="card-bg p-5 rounded-lg border-l-4 border-blue-500">
                <p class="text-slate-500 text-[10px] uppercase tracking-wider font-bold">Vibration (G)</p>
                <p class="text-3xl font-black text-white mt-1" id="val-vib">--</p>
            </div>
            <div class="card-bg p-5 rounded-lg border-l-4 border-amber-500">
                <p class="text-slate-500 text-[10px] uppercase tracking-wider font-bold">Core Thermal</p>
                <p class="text-3xl font-black text-white mt-1" id="val-temp">--°C</p>
            </div>
            <div class="card-bg p-5 rounded-lg border-l-4 border-purple-500">
                <p class="text-slate-500 text-[10px] uppercase tracking-wider font-bold">Maintenance Horizon</p>
                <p class="text-3xl font-black text-white mt-1" id="val-maint">-- KM</p>
            </div>
        </div>

        <!-- Main Dashboard Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Wear Analysis -->
            <div class="lg:col-span-2 card-bg p-6 rounded-lg">
                <h3 class="text-white font-bold mb-6 uppercase text-sm tracking-widest flex items-center">
                    <i class="fa-solid fa-chart-line mr-2 text-emerald-500"></i> Component Wear Decomposition
                </h3>
                <div id="wear-bars" class="space-y-6">
                    <!-- Dynamic injection point -->
                </div>
            </div>

            <!-- Radar Diagnostics -->
            <div class="card-bg p-6 rounded-lg flex flex-col items-center justify-center">
                <canvas id="healthRadar" class="w-full h-64"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Initialize Radar
        const ctx = document.getElementById('healthRadar').getContext('2d');
        const radar = new Chart(ctx, {
            type: 'radar',
            data: { labels: ['Mech', 'Thermal', 'Elec', 'Vib', 'Load'], datasets: [{ data: [98, 92, 99, 95, 88], backgroundColor: 'rgba(16, 185, 129, 0.1)', borderColor: '#10b981', borderWidth: 2 }] },
            options: { scales: { r: { grid: { color: '#1e293b' }, ticks: { display: false }, pointLabels: { color: '#94a3b8' } } }, plugins: { legend: { display: false } } }
        });

        // Telemetry Loop
        async function updateDashboard() {
            try {
                const response = await fetch('/api/get-asset-health');
                const data = await response.json();
                
                // Update Simple KPIs
                document.getElementById('val-mech').innerText = data.mechanical_integrity + '%';
                document.getElementById('val-vib').innerText = data.vibration_g + 'g';
                document.getElementById('val-temp').innerText = data.thermal_stability;
                document.getElementById('val-maint').innerText = (data.predictive_maintenance_km/1000).toFixed(1) + 'k';

                // Update Progress Bars
                const container = document.getElementById('wear-bars');
                container.innerHTML = Object.entries(data.wear_metrics).map(([key, val]) => `
                    <div>
                        <div class="flex justify-between text-[10px] uppercase font-bold mb-2"><span>${key} Module</span><span>${val}%</span></div>
                        <div class="h-1 bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-emerald-500 transition-all duration-1000" style="width: ${val}%"></div></div>
                    </div>
                `).join('');
            } catch(e) { console.error("Telemetry Link Broken"); }
        }

        setInterval(updateDashboard, 3000);
        updateDashboard();
    </script>
</body>
</html>
